#:schema https://raw.githubusercontent.com/<owner>/<repo>/main/schemas/harness.schema.json
# ↑ Taplo / IntelliJ TOML / VS Code Even-Better-TOML read this directive for
# autocomplete + validation. Point it at the local repo path or a published URL.

[meta]
harnex_version = ">=0.1, <0.2"

# ---------- evidence ----------
# Provenance verification for claims in markdown.
# Tighten by setting block_on_memory_only = true once your docs cite consistently.

[evidence]
default_provenance = "memory-only"
block_on_memory_only = false

[[evidence.verifiers]]
provenance = "internal"
strategy = "file-path-line"

[[evidence.verifiers]]
provenance = "memory-only"
strategy = "memory-only"

[[evidence.verifiers]]
provenance = "context7"
strategy = "context7"

[[evidence.verifiers]]
provenance = "fetched-url"
strategy = "fetched-url"
max_age_days = 90

# ---------- telemetry ----------
# Append-only event ledger with closed payload schema per Kind.

[telemetry]
storage = "jsonl"
storage_dir = ".harness/telemetry"
rotate_at_mb = 10

[[telemetry.kinds]]
name = "skill-invoked"
[telemetry.kinds.payload_schema]
type = "object"
required = ["skill", "outcome"]
[telemetry.kinds.payload_schema.properties.skill]
type = "string"
[telemetry.kinds.payload_schema.properties.outcome]
type = "string"
enum = ["ok", "warn", "fail"]
[telemetry.kinds.payload_schema.properties.duration_ms]
type = "integer"

# ---------- validate ----------

[validate.rules]
max_lines = 200
always_loaded_slugs = ["constitution"]

[validate.skills]
max_skill_md_lines = 500
max_description_chars = 1536

# ---------- policy ----------

[policy.permissions]
profiles = ["baseline"]
extra_allow = []
extra_deny = []

# Add your tool pins under [[policy.versions]] when needed.

# ---------- lifecycle ----------
# Promotion / retirement thresholds. Defaults assume a team of ≥3.

[lifecycle]
promotion_min_instances = 3
promotion_min_days = 30
stale_days = 90
silence_window_days = 90
grace_period_days = 30
observation_dir = ".harness/observations"
